events {
    worker_connections 1024;
}

http {
    upstream api {
        server api:3000;
    }

    upstream admin {
        server admin:5173;
    }

    upstream web {
        server web:3004;
    }

    upstream bot_telegram {
        server bot-telegram:3001;
    }

    upstream bot_viber {
        server bot-viber:3002;
    }

    upstream bot_whatsapp {
        server bot-whatsapp:3003;
    }

    server {
        listen 80;
        client_max_body_size 50M;

        location /api/ {
            proxy_pass http://api/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /admin/ {
            proxy_pass http://admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /webhooks/telegram {
            proxy_pass http://bot_telegram/webhook;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /webhooks/viber {
            proxy_pass http://bot_viber/webhook;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /webhooks/whatsapp {
            proxy_pass http://bot_whatsapp/webhook;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            proxy_pass http://web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
