services:
  postgres:
    restart: always
    ports: []

  redis:
    restart: always
    ports: []

  minio:
    restart: always
    ports: []

  api:
    restart: always
    environment:
      NODE_ENV: production
    deploy:
      resources:
        limits:
          memory: 512M

  worker:
    restart: always

  bot-telegram:
    restart: always
    ports: []

  bot-viber:
    restart: always
    ports: []

  bot-whatsapp:
    restart: always
    ports: []

  admin:
    restart: always
    ports: []

  web:
    restart: always
    ports: []

  nginx:
    restart: always
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
