events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=30s ipv6=off;

    server {
        listen 80;
        client_max_body_size 50M;

        location /api/ {
            set $upstream api:3000;
            proxy_pass http://$upstream$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /admin {
            return 301 /admin/;
        }

        location /admin/ {
            set $upstream admin:5173;
            rewrite ^/admin/?(.*)$ /$1 break;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /webhooks/telegram {
            set $upstream bot-telegram:3001;
            proxy_pass http://$upstream/webhook;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /webhooks/viber {
            set $upstream bot-viber:3002;
            proxy_pass http://$upstream/webhook;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /webhooks/whatsapp {
            set $upstream bot-whatsapp:3003;
            proxy_pass http://$upstream/webhook;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            set $upstream web:3004;
            proxy_pass http://$upstream$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
