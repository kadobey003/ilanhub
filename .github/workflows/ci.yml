name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        continue-on-error: true

      - run: pnpm install

      - run: pnpm --filter @ilanhub/database build
      - run: pnpm --filter @ilanhub/shared build
      - run: pnpm --filter @ilanhub/i18n build
      - run: pnpm --filter @ilanhub/pricing build
      - run: pnpm --filter @ilanhub/payments build
      - run: pnpm --filter @ilanhub/analytics build
      - run: pnpm build
